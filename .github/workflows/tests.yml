name: 🧪 Automated Unit Testing Matrix

# 🚀 TRIGGERS: Run this pipeline automatically on every push or pull request to the main branch
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  run-tests:
    runs-on: ubuntu-latest # Boots up a fresh Linux container in the GitHub cloud

    steps:
    # 1. Download your latest code onto the virtual Linux machine
    - name: 📂 Checkout Repository Code
      uses: actions/checkout@v4

    # 2. Install the exact modern .NET 10 SDK required to compile your system
    - name: ⚙️ Setup .NET 10 Environment
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'

    # 3. Pull down all required NuGet packages from the correct subfolder directory
    - name: 📥 Restore Core NuGet Dependencies
      working-directory: ./LLM-TriageAgent.API
      run: dotnet restore

    # 4. Compile the entire C# codebase in Release mode from the correct subfolder
    - name: 🏗️ Compile Application Binaries
      working-directory: ./LLM-TriageAgent.API
      run: dotnet build --no-restore --configuration Release

    # 5. ✅ FIXED: Point the test runner directly at your .Tests project file folder!
    - name: 🧪 Execute Automated Unit Test Suite
      working-directory: ./LLM-TriageAgent.Tests
      run: dotnet test --no-build --configuration Release --verbosity normal
